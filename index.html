<!DOCTYPE html>
<html lang="it">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Developer Portfolio</title>

<link rel="stylesheet" href="https://unpkg.com/aos@2.3.1/dist/aos.css"/>
<script src="https://cdn.jsdelivr.net/npm/particles.js"></script>

<style>

/* RESET */

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, Helvetica, sans-serif;
}

/* LOADER */

#loader{
position:fixed;
width:100%;
height:100vh;
background:#0f172a;
display:flex;
align-items:center;
justify-content:center;
z-index:999;
}

.spinner{
width:60px;
height:60px;
border:5px solid #1e293b;
border-top:5px solid #38bdf8;
border-radius:50%;
animation:spin 1s linear infinite;
}

@keyframes spin{
100%{transform:rotate(360deg);}
}

/* BODY */

body{
background:linear-gradient(135deg,#0f172a,#1e293b);
color:white;
scroll-behavior:smooth;
}

/* NAVBAR */

nav{
position:fixed;
top:0;
width:100%;
background:rgba(0,0,0,0.6);
backdrop-filter:blur(10px);
display:flex;
justify-content:center;
gap:30px;
padding:15px;
z-index:100;
}

nav a{
color:white;
text-decoration:none;
font-weight:bold;
}

/* HERO */

.hero{
height:100vh;
background:url("https://images.unsplash.com/photo-1498050108023-c5249f4df085") center/cover fixed;
display:flex;
align-items:center;
justify-content:center;
text-align:center;
}

.hero h1{
font-size:60px;
}

.btn{
display:inline-block;
margin-top:20px;
background:#38bdf8;
color:black;
padding:12px 20px;
border-radius:8px;
text-decoration:none;
font-weight:bold;
}

/* CONTAINER */

.container{
max-width:1100px;
margin:auto;
padding:80px 20px;
}

/* FILTER */

.filter{
text-align:center;
margin-bottom:20px;
}

.filter button{
margin:5px;
padding:8px 15px;
border:none;
background:#38bdf8;
cursor:pointer;
border-radius:5px;
}

/* PROJECT GRID */

.projects{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:20px;
}

.card{
position:relative;
overflow:hidden;
border-radius:10px;
transition:transform 0.4s, box-shadow 0.4s;
transform-style:preserve-3d;
}

.card:hover{
transform:rotateY(10deg) rotateX(6deg) scale(1.05);
box-shadow:0 20px 40px rgba(0,0,0,0.4);
}

.card img{
width:100%;
height:200px;
object-fit:cover;
}

.overlay{
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.7);
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
opacity:0;
transition:0.3s;
}

.card:hover .overlay{
opacity:1;
}

/* SKILLS */

.skills{
display:flex;
flex-wrap:wrap;
gap:10px;
margin-top:20px;
}

.skill{
background:#38bdf8;
color:black;
padding:8px 12px;
border-radius:6px;
}

/* TESTIMONIAL */

.testimonial-box{
background:rgba(255,255,255,0.08);
padding:30px;
border-radius:10px;
text-align:center;
margin-top:20px;
}

/* CONTACT */

.contact-form input,
.contact-form textarea{
width:100%;
padding:12px;
margin-top:10px;
border-radius:6px;
border:none;
}

.contact-form button{
margin-top:10px;
background:#38bdf8;
border:none;
padding:12px;
border-radius:6px;
cursor:pointer;
}

/* FOOTER */

footer{
margin-top:80px;
text-align:center;
padding:40px;
background:black;
}

.socials a{
font-size:25px;
margin:0 10px;
text-decoration:none;
}

/* BACK TO TOP */

#topBtn{
position:fixed;
bottom:30px;
right:30px;
background:#38bdf8;
border:none;
padding:12px;
border-radius:50%;
cursor:pointer;
display:none;
}

/* CURSOR */

.cursor{
width:20px;
height:20px;
border:2px solid #38bdf8;
border-radius:50%;
position:fixed;
pointer-events:none;
transform:translate(-50%,-50%);
}

.light-mode{
background:#f1f5f9;
color:#0f172a;
}

.card{
transition:transform 0.4s;
}

.card:hover{
transform:rotateY(10deg) rotateX(5deg) scale(1.05);
}

#repos{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:20px;
margin-top:30px;
}

.repo-card{
background:rgba(255,255,255,0.08);
padding:20px;
border-radius:10px;
transition:0.3s;
}

.repo-card:hover{
transform:translateY(-5px);
}

section{
animation:fadeUp 1s ease;
}

@keyframes fadeUp{

from{
opacity:0;
transform:translateY(40px);
}

to{
opacity:1;
transform:translateY(0);
}

}

#particles-js{
position:fixed;
width:100%;
height:100%;
top:0;
left:0;
z-index:-1;
}

#progressBar{
position:fixed;
top:0;
left:0;
height:4px;
background:#38bdf8;
width:0%;
z-index:999;
}

#loader{
position:fixed;
width:100%;
height:100vh;
background:#0f172a;
display:flex;
align-items:center;
justify-content:center;
z-index:9999;
}

.loader-text{
color:white;
font-size:28px;
letter-spacing:3px;
animation:pulse 1.5s infinite;
}

@keyframes pulse{

0%{opacity:0.4;}
50%{opacity:1;}
100%{opacity:0.4;}

}

.reveal{
opacity:0;
transform:translateY(40px);
transition:all 0.8s ease;
}

.reveal.active{
opacity:1;
transform:translateY(0);
}

    .profile{
width:150px;
height:150px;
border-radius:50%;
object-fit:cover;
border:4px solid #38bdf8;
margin-bottom:20px;
}

</style>

</head>

<body>
    
<div id="progressBar"></div>
    <div id="particles-js"></div>
<div id="loader"><div class="spinner"></div></div>

<div class="cursor"></div>

<nav>
    <button id="themeToggle">🌙</button>

<a href="#home">Home</a>
<a href="#projects">Projects</a>
<a href="#skills">Skills</a>
<a href="#contact">Contact</a>

</nav>

<section class="hero" id="home">
    <img src="profile.jpg" class="profile">

<div>


<h1>I'm <span id="typing"></span></h1>



<a href="https://github.com/daviderusu71" class="btn">
My GitHub
</a>

</div>

</section>

<div class="container">

<section id="projects" data-aos="fade-up">

<h2>Projects</h2>

<div class="filter">

<button onclick="filterProjects('all')">All</button>
<button onclick="filterProjects('js')">JavaScript</button>
<button onclick="filterProjects('ui')">UI</button>

</div>

<div class="projects">

<div class="card js">

<img src="https://images.unsplash.com/photo-1557821552-17105176677c">

<div class="overlay">

<h3>E-commerce</h3>
<p>JavaScript Shop</p>

</div>

</div>

<div class="card ui">

<img src="https://images.unsplash.com/photo-1551288049-bebda4e38f71">

<div class="overlay">

<h3>Dashboard</h3>
<p>Modern UI</p>

</div>

</div>

</div>

</section>

<section id="skills" data-aos="fade-up">

<h2>Skills</h2>

<div class="skills">

<div class="skill">HTML</div>
<div class="skill">CSS</div>
<div class="skill">JavaScript</div>
<div class="skill">React</div>

</div>

</section>


<section id="github">

<h2>My GitHub Projects</h2>

<div id="repos"></div>

</section>



<section data-aos="fade-up">

<h2>Testimonials</h2>

<div class="testimonial-box">

<p id="testimonial-text">
Great developer!
</p>

<h4 id="testimonial-name">— Marco</h4>

</div>

</section>

<section id="contact" data-aos="fade-up">

<h2>Contact</h2>

<form action="mailto:youremail@email.com" method="post" enctype="text/plain" class="contact-form">

<input type="text" name="name" placeholder="Name" required>

<input type="email" name="email" placeholder="Email" required>

<textarea name="message" placeholder="Message"></textarea>

<button type="submit">Send</button>

</form>

</section>

</div>

<footer>

<h3>Dev Portfolio</h3>

<div class="socials">

<a href="#">🌐</a>
<a href="#">🐱</a>
<a href="#">💼</a>

</div>

<p>© 2026</p>

</footer>

<button id="topBtn">↑</button>

<script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>

<script>

AOS.init();

/* LOADER */

window.onload=function(){

document.getElementById("loader").style.display="none";

}

/* BACK TO TOP */

const topBtn=document.getElementById("topBtn");

window.onscroll=function(){

if(document.documentElement.scrollTop>200){

topBtn.style.display="block";

}else{

topBtn.style.display="none";

}

}

topBtn.onclick=function(){

window.scrollTo({top:0,behavior:"smooth"})

}

/* PROJECT FILTER */

function filterProjects(type){

const cards=document.querySelectorAll(".card");

cards.forEach(card=>{

if(type==="all"){
card.style.display="block";
}
else if(card.classList.contains(type)){
card.style.display="block";
}
else{
card.style.display="none";
}

})

}

/* TESTIMONIAL SLIDER */

const testimonials=[
{text:"Amazing work!",name:"Marco"},
{text:"Beautiful UI!",name:"Luca"},
{text:"Highly recommended!",name:"Giulia"}
];

let index=0;

setInterval(()=>{

index++;

if(index>=testimonials.length){
index=0;
}

document.getElementById("testimonial-text").textContent=testimonials[index].text;
document.getElementById("testimonial-name").textContent="— "+testimonials[index].name;

},4000);

/* CURSOR */

const cursor=document.querySelector(".cursor");

document.addEventListener("mousemove",e=>{

cursor.style.left=e.clientX+"px";
cursor.style.top=e.clientY+"px";

});

const words = ["Developer", "Web Designer", "JavaScript Lover"];

let i = 0;
let j = 0;
let currentWord = "";
let isDeleting = false;

function type() {

currentWord = words[i];

if(isDeleting){
j--;
}else{
j++;
}

document.getElementById("typing").textContent = currentWord.substring(0,j);

if(!isDeleting && j === currentWord.length){

isDeleting = true;
setTimeout(type,1000);
return;

}

if(isDeleting && j === 0){

isDeleting = false;
i++;

if(i === words.length){
i = 0;
}

}

setTimeout(type,120);

}

type();

const toggle=document.getElementById("themeToggle");

toggle.onclick=function(){

document.body.classList.toggle("light-mode");

}

fetch("https://api.github.com/users/daviderusu71/repos")
.then(res => res.json())
.then(data => {

const repos = document.getElementById("repos");

data.slice(0,6).forEach(repo => {

repos.innerHTML += `
<div class="repo-card">

<h3>${repo.name}</h3>

<p>${repo.description || "GitHub Project"}</p>

<a href="${repo.html_url}" target="_blank">
View Project
</a>

</div>
`

})

})

particlesJS("particles-js", {

particles: {

number: {
value: 80
},

size: {
value: 3
},

move: {
speed: 2
},

line_linked: {
enable: true
}

},

interactivity: {

events: {

onhover: {
enable: true,
mode: "repulse"
}

}

}

});

window.onscroll = function(){

let winScroll =
document.documentElement.scrollTop;

let height =
document.documentElement.scrollHeight -
document.documentElement.clientHeight;

let scrolled =
(winScroll / height) * 100;

document.getElementById("progressBar").style.width =
scrolled + "%";

};

window.onload = function(){

document.getElementById("loader").style.display = "none";

}


</script>



</body>
</html>
